name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: |
          cat > .npmrc <<EOF
          @rivora-labz:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${{ secrets.NPM_TOKEN_RIVORA }}
          EOF
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: npm i -g vercel@latest
      - run: |
          cat > .npmrc <<EOF
          @rivora-labz:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${{ secrets.NPM_TOKEN_RIVORA }}
          EOF
      - name: Pull Vercel env
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN
      - name: Build
        run: vercel build --prod --token=$VERCEL_TOKEN
      - name: Deploy
        id: deploy
        run: |
          mkdir -p /tmp/vdeploy
          cp -r .vercel /tmp/vdeploy/
          cd /tmp/vdeploy
          URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed: $URL"
      - name: Smoke test
        run: |
          sleep 5
          curl -fsS -o /dev/null -w "HTTP %{http_code}\n" "${{ steps.deploy.outputs.url }}" || (echo "Smoke test failed" && exit 1)
